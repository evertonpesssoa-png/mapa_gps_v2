<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mapa Inteligente</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: Arial, sans-serif;
}

#map {
  width: 100%;
  height: 100%;
}

#search-panel,
#action-panel,
#route-panel {
  position: absolute;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
  z-index: 9999;
}

#search-panel {
  top: 10px;
  left: 10px;
  width: 260px;
  padding: 10px;
  display: none;
}

#search-input,
#route-origin,
#route-destination {
  width: 100%;
  padding: 8px;
  margin-bottom: 8px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

#search-results {
  max-height: 220px;
  overflow-y: auto;
}

#action-panel {
  bottom: 20px;
  left: 10px;
  width: 260px;
  padding: 12px;
  display: none;
}

#route-panel {
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 360px;
  padding: 12px;
  display: none;
  flex-direction: column;
  gap: 8px;
}

.mode-container {
  display: flex;
  gap: 8px;
}

.mode-btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.mode-btn.active {
  outline: 2px solid black;
}

#createRouteBtn {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.map-controls {
  position: absolute;
  right: 12px;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}

.control-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  font-size: 18px;
  cursor: pointer;
}

#route-info {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 10px 14px;
  border-radius: 12px;
  z-index: 9999;
  font-weight: bold;
}

.suggestions {
  max-height: 100px;
  overflow-y: auto;
}

.suggestions div {
  padding: 6px;
  cursor: pointer;
}

.suggestions div:hover {
  background: #eee;
}
</style>
</head>
<body>

<div id="search-panel">
  <input id="search-input" placeholder="Buscar local...">
  <div id="search-results"></div>
</div>

<div id="route-panel">
  <input id="route-origin" placeholder="Origem (ou vazio para GPS)">
  <div id="origin-suggestions" class="suggestions"></div>

  <input id="route-destination" placeholder="Destino">
  <div id="dest-suggestions" class="suggestions"></div>

  <div class="mode-container">
    <button class="mode-btn active" data-mode="foot">🚶</button>
    <button class="mode-btn" data-mode="bike">🚴</button>
    <button class="mode-btn" data-mode="car">🚗</button>
  </div>

  <button id="createRouteBtn">Criar rota</button>
</div>

<div id="action-panel"></div>

<div id="route-info"></div>

<div id="map"></div>

<div class="map-controls">
  <button class="control-btn" onclick="toggleSearch()">🔎</button>
  <button class="control-btn" onclick="centerOnUser()">📍</button>
  <button class="control-btn" onclick="toggleRoute()">➜</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="js/icons.js"></script>
<script src="js/geocoding.js"></script>
<script src="js/pois.js"></script>
<script src="data/manual_pois.js"></script>
<script src="js/routing.js"></script>
<script src="js/search.js"></script>
<script src="js/mapa.js"></script>

</body>
</html>
