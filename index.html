<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no
  "
/>

<title>Mapa Inteligente</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

/* ====================================== */
/* BASE */
/* ====================================== */

html,
body {

  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;

  overflow: hidden;

  font-family:
    Arial,
    sans-serif;

  background:
    #f2f2f2;
}

* {

  box-sizing:
    border-box;
}

#map {

  width: 100%;
  height: 100%;
}

/* ====================================== */
/* PAINÉIS */
/* ====================================== */

#search-panel,
#action-panel,
#route-panel {

  position: absolute;

  background:
    white;

  border-radius:
    14px;

  box-shadow:
    0 4px 18px
    rgba(0,0,0,.22);

  z-index: 9999;
}

/* ====================================== */
/* SEARCH PANEL */
/* ====================================== */

#search-panel {

  top: 10px;
  left: 10px;

  width:
    min(320px, calc(100vw - 20px));

  padding: 10px;

  display: none;
}

#search-input,
#route-origin,
#route-destination {

  width: 100%;

  padding: 10px;

  margin-bottom: 8px;

  border:
    1px solid #ccc;

  border-radius: 8px;

  outline: none;

  font-size: 15px;
}

#search-input:focus,
#route-origin:focus,
#route-destination:focus {

  border-color:
    #555;
}

/* ====================================== */
/* SEARCH RESULTS */
/* ====================================== */

#search-results {

  max-height: 280px;

  overflow-y: auto;

  border-radius: 8px;
}

/* ====================================== */
/* ACTION PANEL */
/* ====================================== */

#action-panel {

  bottom: 20px;
  left: 10px;

  width:
    min(320px, calc(100vw - 20px));

  padding: 12px;

  display: none;
}

/* ====================================== */
/* ROUTE PANEL */
/* ====================================== */

#route-panel {

  top: 70px;
  left: 50%;

  transform:
    translateX(-50%);

  width:
    min(360px, calc(100vw - 20px));

  padding: 12px;

  display: none;

  flex-direction: column;

  gap: 8px;
}

/* ====================================== */
/* MODOS */
/* ====================================== */

.mode-container {

  display: flex;

  gap: 8px;
}

.mode-btn {

  flex: 1;

  padding: 10px;

  border: none;

  border-radius: 10px;

  background:
    #f2f2f2;

  cursor: pointer;

  font-size: 18px;

  transition: .2s;
}

.mode-btn:hover {

  background:
    #e6e6e6;
}

.mode-btn.active {

  outline:
    2px solid black;

  background:
    #ddd;
}

/* ====================================== */
/* BOTÃO ROTA */
/* ====================================== */

#createRouteBtn {

  padding: 12px;

  border: none;

  border-radius: 10px;

  background:
    black;

  color:
    white;

  font-weight: bold;

  cursor: pointer;

  transition: .2s;
}

#createRouteBtn:hover {

  opacity: .9;
}

/* ====================================== */
/* CONTROLES MAPA */
/* ====================================== */

.map-controls {

  position: absolute;

  right: 12px;
  bottom: 20px;

  display: flex;

  flex-direction: column;

  gap: 10px;

  z-index: 9999;
}

.control-btn {

  width: 52px;
  height: 52px;

  border-radius: 50%;

  border: none;

  background:
    white;

  box-shadow:
    0 2px 10px
    rgba(0,0,0,.28);

  font-size: 18px;

  cursor: pointer;

  transition: .2s;
}

.control-btn:hover {

  transform:
    scale(1.05);
}

/* ====================================== */
/* ROUTE INFO */
/* ====================================== */

#route-info {

  position: absolute;

  bottom: 14px;
  left: 50%;

  transform:
    translateX(-50%);

  background:
    white;

  padding:
    10px 14px;

  border-radius:
    12px;

  z-index: 9999;

  font-weight: bold;

  box-shadow:
    0 2px 10px
    rgba(0,0,0,.2);

  display: none;
}

/* ====================================== */
/* SUGESTÕES */
/* ====================================== */

.suggestions {

  max-height: 120px;

  overflow-y: auto;

  border-radius: 8px;
}

.suggestions div {

  padding: 8px;

  cursor: pointer;

  border-radius: 6px;

  transition: .15s;
}

.suggestions div:hover {

  background:
    #eee;
}

/* ====================================== */
/* SCROLL */
/* ====================================== */

::-webkit-scrollbar {

  width: 8px;
}

::-webkit-scrollbar-thumb {

  background:
    rgba(0,0,0,.25);

  border-radius: 20px;
}

/* ====================================== */
/* MOBILE */
/* ====================================== */

@media (max-width: 600px) {

  #route-panel {

    top: auto;

    bottom: 80px;
  }

  .control-btn {

    width: 50px;
    height: 50px;
  }
}

</style>
</head>

<body>

<!-- ====================================== -->
<!-- SEARCH PANEL -->
<!-- ====================================== -->

<div id="search-panel">

  <input
    id="search-input"
    autocomplete="off"
    placeholder="Buscar cidade, rua, mercado..."
  />

  <div id="search-results"></div>

</div>

<!-- ====================================== -->
<!-- ROUTE PANEL -->
<!-- ====================================== -->

<div id="route-panel">

  <input
    id="route-origin"
    autocomplete="off"
    placeholder="Origem (vazio = GPS)"
  />

  <div
    id="origin-suggestions"
    class="suggestions"
  ></div>

  <input
    id="route-destination"
    autocomplete="off"
    placeholder="Destino"
  />

  <div
    id="dest-suggestions"
    class="suggestions"
  ></div>

  <div class="mode-container">

    <button
      class="mode-btn active"
      data-mode="foot"
    >
      🚶
    </button>

    <button
      class="mode-btn"
      data-mode="bike"
    >
      🚴
    </button>

    <button
      class="mode-btn"
      data-mode="car"
    >
      🚗
    </button>

  </div>

  <button id="createRouteBtn">
    Criar rota
  </button>

</div>

<!-- ====================================== -->
<!-- ACTION PANEL -->
<!-- ====================================== -->

<div id="action-panel"></div>

<!-- ====================================== -->
<!-- ROUTE INFO -->
<!-- ====================================== -->

<div id="route-info"></div>

<!-- ====================================== -->
<!-- MAP -->
<!-- ====================================== -->

<div id="map"></div>

<!-- ====================================== -->
<!-- MAP CONTROLS -->
<!-- ====================================== -->

<div class="map-controls">

  <button
    class="control-btn"
    onclick="toggleSearch()"
    title="Buscar"
  >
    🔎
  </button>

  <button
    class="control-btn"
    onclick="centerOnUser()"
    title="Minha localização"
  >
    📍
  </button>

  <button
    class="control-btn"
    onclick="toggleRoute()"
    title="Rotas"
  >
    ➜
  </button>

  <button
    class="control-btn"
    onclick="reloadNearbyPOIs()"
    title="Recarregar POIs"
  >
    🔄
  </button>

</div>

<!-- ====================================== -->
<!-- LEAFLET -->
<!-- ====================================== -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ====================================== -->
<!-- APP -->
<!-- ====================================== -->

<!-- ORDEM IMPORTA MUITO -->

<script src="js/icons.js"></script>

<!-- GPS CENTRAL -->
<script src="js/locationEngine.js"></script>

<!-- GEOCODING -->
<script src="js/geocoding.js"></script>

<!-- POIs -->
<script src="js/pois.js"></script>

<!-- DADOS -->
<script src="data/manual_pois.js"></script>

<!-- ROTA -->
<script src="js/routing.js"></script>

<!-- SEARCH -->
<script src="js/search.js"></script>

<!-- MAPA -->
<script src="js/mapa.js"></script>

</body>
</html>
