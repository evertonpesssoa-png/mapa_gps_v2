<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1a1a2e" />
<title>Mapa Inteligente • Asuras Copilotos</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
/* ====================================== */
/* VARIÁVEIS CSS */
/* ====================================== */

:root {
    --menu-width: 360px;
    --control-size: 52px;
    --control-size-mobile: 44px;
    --font-size-base: 16px;
    --font-size-mobile: 14px;
}

/* ====================================== */
/* TEMAS (CLARO/ESCURO) */
/* ====================================== */

/* Tema claro (padrão) */
:root,
[data-theme="light"] {
    --bg-primary: #ffffff;
    --bg-secondary: #f8f9fa;
    --bg-tertiary: #f0f0f0;
    --text-primary: #1a1a2e;
    --text-secondary: #666;
    --text-tertiary: #888;
    --card-bg: #ffffff;
    --card-bg-secondary: #f8f9fa;
    --card-border: #eee;
    --shadow: rgba(0,0,0,0.1);
    --shadow-strong: rgba(0,0,0,0.2);
    --border-color: #e0e0e0;
    --accent-color: #ff4db8;
    --accent-hover: #e043a0;
}

/* Tema escuro */
[data-theme="dark"] {
    --bg-primary: #0a0a14;
    --bg-secondary: #13131f;
    --bg-tertiary: #1a1a2a;
    --text-primary: #ffffff;
    --text-secondary: #aaa;
    --text-tertiary: #888;
    --card-bg: #0f0f1a;
    --card-bg-secondary: #1a1a2a;
    --card-border: #2a2a3a;
    --shadow: rgba(0,0,0,0.3);
    --shadow-strong: rgba(0,0,0,0.5);
    --border-color: #2a2a3a;
    --accent-color: #ff66c0;
    --accent-hover: #ff4db8;
}

/* Aplicar cores base */
body {
    background: var(--bg-primary);
    color: var(--text-primary);
    transition: background 0.3s ease, color 0.3s ease;
}

/* ====================================== */
/* BOTÕES MAPA/SATÉLITE */
/* ====================================== */

.map-layer-controls {
    position: absolute;
    top: 20px;
    left: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 9999;
}

.layer-buttons {
    display: flex;
    gap: 8px;
    background: var(--card-bg);
    border-radius: 30px;
    padding: 6px;
    box-shadow: 0 2px 10px var(--shadow);
}

.layer-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--bg-secondary);
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: var(--text-primary);
}

.layer-btn.active {
    background: var(--accent-color);
    color: white;
}

.layer-btn:hover {
    transform: scale(1.05);
    background: var(--bg-tertiary);
}

/* ====================================== */
/* BASE */
/* ====================================== */

html {
    font-size: var(--font-size-base);
}

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

#map {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}

/* Leaflet popup no tema escuro */
[data-theme="dark"] .leaflet-popup-content-wrapper {
    background: var(--card-bg);
    color: var(--text-primary);
}

[data-theme="dark"] .leaflet-popup-tip {
    background: var(--card-bg);
}

[data-theme="dark"] .leaflet-control-attribution {
    background: rgba(0,0,0,0.7);
    color: #aaa;
}

/* ====================================== */
/* PAINÉIS */
/* ====================================== */

#search-panel,
#action-panel,
#route-panel {
  position: absolute;
  background: var(--card-bg);
  border-radius: 14px;
  box-shadow: 0 4px 18px var(--shadow);
  z-index: 10001;
}

#search-panel {
  top: 10px;
  left: 10px;
  width: min(320px, calc(100vw - 20px));
  padding: 10px;
  display: none;
}

#search-input,
#route-origin,
#route-destination {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  outline: none;
  font-size: 15px;
  background: var(--bg-secondary);
  color: var(--text-primary);
}

#search-input:focus,
#route-origin:focus,
#route-destination:focus {
  border-color: var(--accent-color);
}

#search-results {
  max-height: 280px;
  overflow-y: auto;
  border-radius: 8px;
}

/* SUGESTÕES DE BUSCA NO TEMA ESCURO */
[data-theme="dark"] #search-results div,
[data-theme="dark"] .suggestions div {
    background: var(--bg-secondary) !important;
    color: var(--text-primary) !important;
    border-bottom: 1px solid var(--card-border) !important;
}

[data-theme="dark"] #search-results div:hover,
[data-theme="dark"] .suggestions div:hover {
    background: var(--bg-tertiary) !important;
    color: var(--text-primary) !important;
}

[data-theme="dark"] #search-results {
    background: var(--bg-primary);
    border: 1px solid var(--card-border);
    border-radius: 8px;
}

#action-panel {
  bottom: 20px;
  left: 10px;
  width: min(320px, calc(100vw - 20px));
  padding: 12px;
  display: none;
}

#route-panel {
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  width: min(360px, calc(100vw - 20px));
  padding: 12px;
  display: none;
  flex-direction: column;
  gap: 8px;
}

/* CABEÇALHO DO PAINEL DE ROTA */
.route-panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--card-border);
}

.route-panel-header h3 {
  margin: 0;
  font-size: 16px;
}

.route-panel-buttons {
  display: flex;
  gap: 8px;
}

.route-panel-buttons button {
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  transition: all 0.2s ease;
}

.btn-exit-route {
  background: #f97316;
  color: white;
}

.btn-exit-route:hover {
  background: #ea580c;
  transform: scale(1.02);
}

.btn-close-card {
  background: #ef4444;
  color: white;
}

.btn-close-card:hover {
  background: #dc2626;
  transform: scale(1.02);
}

.mode-container {
  display: flex;
  gap: 8px;
}

.mode-btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: var(--bg-secondary);
  cursor: pointer;
  font-size: 18px;
  transition: .2s;
  color: var(--text-primary);
}

.mode-btn:hover {
  background: var(--bg-tertiary);
}

.mode-btn.active {
  outline: 2px solid var(--accent-color);
  background: var(--bg-tertiary);
}

#createRouteBtn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: var(--accent-color);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: .2s;
}

#createRouteBtn:hover {
  opacity: .9;
}

/* ====================================== */
/* CONTROLES DO MAPA (DIREITA) - SUBIDOS */
/* ====================================== */

.map-controls {
  position: absolute;
  right: 12px;
  bottom: 100px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}

.control-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: none;
  background: var(--card-bg);
  box-shadow: 0 2px 10px var(--shadow);
  font-size: 18px;
  cursor: pointer;
  transition: .2s;
  color: var(--text-primary);
  display: flex !important;
  align-items: center;
  justify-content: center;
}

.control-btn:hover {
  transform: scale(1.05);
  background: var(--bg-tertiary);
}

/* Botão de trânsito ativo */
#btn-transito.active {
  background: #3b82f6;
  color: white;
  box-shadow: 0 0 0 2px white, 0 0 0 4px #3b82f6;
}

/* ====================================== */
/* BOTÃO MENU + TEMPERATURA + RELÓGIO */
/* ====================================== */

.menu-area {
  position: absolute;
  top: 80px;
  right: 20px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  z-index: 9999;
}

.menu-toggle-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--card-bg);
  box-shadow: 0 2px 10px var(--shadow);
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--text-primary);
}

.menu-toggle-btn:hover {
  transform: scale(1.05);
  background: var(--bg-tertiary);
}

#temp-indicator {
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(8px);
  color: white;
  padding: 8px 14px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: bold;
  text-align: center;
  box-shadow: 0 2px 10px var(--shadow);
  cursor: pointer;
  transition: all 0.2s ease;
}

#temp-indicator:hover {
  background: rgba(0, 0, 0, 0.85);
  transform: scale(1.02);
}

#clock-indicator {
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(8px);
  color: white;
  padding: 8px 14px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: bold;
  text-align: center;
  box-shadow: 0 2px 10px var(--shadow);
  cursor: pointer;
  transition: all 0.2s ease;
}

#clock-indicator:hover {
  background: rgba(0, 0, 0, 0.85);
  transform: scale(1.02);
}

/* ====================================== */
/* MENU LATERAL */
/* ====================================== */

.side-menu {
  position: fixed;
  top: 0;
  right: -380px;
  width: 360px;
  max-width: 90vw;
  height: 100%;
  background: var(--bg-primary);
  box-shadow: -2px 0 20px var(--shadow);
  z-index: 10002;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.side-menu.open {
  right: 0;
}

.menu-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--card-border);
  background: var(--bg-primary);
  position: sticky;
  top: 0;
  z-index: 1;
}

.menu-header h3 {
  margin: 0;
  font-size: 18px;
}

.close-menu-btn {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--text-secondary);
  padding: 0;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  transition: all 0.2s ease;
}

.close-menu-btn:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.menu-tabs {
  display: flex;
  border-bottom: 1px solid var(--card-border);
  background: var(--bg-primary);
  position: sticky;
  top: 60px;
  z-index: 1;
}

.menu-tab {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s ease;
}

.menu-tab.active {
  color: var(--accent-color);
  border-bottom: 2px solid var(--accent-color);
}

.menu-tab-content {
  display: none;
  padding: 20px;
  flex: 1;
}

.menu-tab-content.active {
  display: block;
}

/* ====================================== */
/* CLIMA - VERSÃO MELHORADA (NÚMEROS VISÍVEIS) */
/* ====================================== */

.weather-loading,
.weather-error,
.time-loading,
.time-error {
  text-align: center;
  padding: 20px;
  color: var(--text-secondary);
}

.weather-card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 4px 15px var(--shadow);
  border: 1px solid var(--card-border);
}

.weather-header {
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 8px;
}

.weather-city {
  font-size: 16px;
  font-weight: bold;
  color: var(--text-primary);
  background: var(--bg-tertiary);
  padding: 4px 12px;
  border-radius: 20px;
  display: inline-block;
}

.weather-main {
  text-align: center;
  margin-bottom: 20px;
}

.weather-icon {
  width: 64px;
  height: 64px;
  filter: drop-shadow(2px 2px 4px var(--shadow));
}

.weather-temp {
  font-size: 42px;
  font-weight: bold;
  color: var(--text-primary);
  margin: 8px 0;
}

.weather-condition {
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  background: var(--bg-secondary);
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
}

.weather-details-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 16px;
}

.weather-detail {
  text-align: center;
  background: var(--card-bg-secondary);
  padding: 10px 8px;
  border-radius: 12px;
  box-shadow: 0 1px 3px var(--shadow);
  border: 1px solid var(--card-border);
}

.detail-label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  font-weight: 500;
}

.detail-value {
  font-size: 20px;
  font-weight: bold;
  color: var(--text-primary);
}

/* Sensação térmica */
.weather-sensacao {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-color);
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}

/* Horário */
.time-card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid var(--card-border);
}

.time-current {
  text-align: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-color);
}

.time-current-city {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 8px;
}

.time-current-value {
  font-size: 42px;
  font-weight: bold;
  margin: 8px 0;
  color: var(--text-primary);
}

.time-current-period {
  font-size: 14px;
  color: var(--text-secondary);
}

.time-zone {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 8px;
}

.time-diff {
  background: var(--bg-secondary);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  margin-top: 12px;
}

.time-diff-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.time-diff-value {
  font-size: 18px;
  font-weight: bold;
  color: var(--accent-color);
}

/* ====================================== */
/* RELEVO */
/* ====================================== */

.relevo-loading,
.relevo-error {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}

.relevo-card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  border: 1px solid var(--card-border);
}

.relevo-main {
  margin-bottom: 20px;
}

.relevo-icon {
  font-size: 48px;
  margin-bottom: 10px;
}

.relevo-altitude {
  font-size: 36px;
  font-weight: bold;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.relevo-descricao {
  font-size: 14px;
  color: var(--text-secondary);
}

.relevo-info {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 16px;
  text-align: left;
}

.relevo-info-item {
  background: var(--card-bg-secondary);
  padding: 10px;
  border-radius: 12px;
}

.relevo-info-item .info-label {
  display: block;
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}

.relevo-info-item .info-value {
  font-size: 14px;
  font-weight: bold;
  color: var(--text-primary);
}

.relevo-dica {
  font-size: 11px;
  color: var(--text-tertiary);
  background: var(--bg-secondary);
  padding: 8px 12px;
  border-radius: 20px;
  text-align: center;
}

/* ====================================== */
/* ROUTE INFO */
/* ====================================== */

#route-info {
  position: absolute;
  bottom: 160px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card-bg);
  padding: 10px 14px;
  border-radius: 12px;
  z-index: 9998;
  font-weight: bold;
  box-shadow: 0 2px 10px var(--shadow);
  display: none;
  text-align: center;
  min-width: 140px;
  border: 1px solid var(--card-border);
  color: var(--text-primary);
}

.suggestions {
  max-height: 120px;
  overflow-y: auto;
  border-radius: 8px;
}

.suggestions div {
  padding: 8px;
  cursor: pointer;
  border-radius: 6px;
  transition: .15s;
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.suggestions div:hover {
  background: var(--bg-tertiary);
}

/* ====================================== */
/* BOTÕES FLUTUANTES */
/* ====================================== */

.open-chat-btn {
  background: linear-gradient(135deg, #ff4db8, #ff88dd);
  border: none;
  border-radius: 50%;
  width: 56px;
  height: 56px;
  font-size: 1.8rem;
  cursor: pointer;
  box-shadow: 0 4px 15px var(--shadow-strong);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;
}

.open-chat-btn:hover {
  transform: scale(1.05);
}

.open-chat-btn.hidden {
  display: none;
}

/* ====================================== */
/* CHAT DO ASURA */
/* ====================================== */

.asura-chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 360px;
  max-width: calc(100vw - 40px);
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  z-index: 10000;
  transition: all 0.3s ease;
  box-shadow: 0 8px 32px var(--shadow-strong);
  font-family: Arial, sans-serif;
}

.asura-chat.collapsed {
  transform: translateY(calc(100% - 60px));
}

.asura-chat .chat-header {
  padding: 12px 16px;
  background: rgba(0, 0, 0, 0.7);
  border-radius: 20px 20px 0 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.asura-chat .chat-header-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.asura-chat .chat-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}

.asura-chat .chat-header h4 {
  color: #fff;
  font-size: 0.9rem;
  margin: 0;
}

.asura-chat .chat-status {
  font-size: 0.65rem;
  opacity: 0.7;
  color: #fff;
}

.asura-chat .chat-controls {
  display: flex;
  gap: 8px;
}

.asura-chat .chat-controls button {
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  font-size: 1.1rem;
  opacity: 0.7;
  transition: opacity 0.2s;
  padding: 0 4px;
}

.asura-chat .chat-controls button:hover {
  opacity: 1;
}

.asura-chat .chat-body {
  display: flex;
  flex-direction: column;
  height: 400px;
}

.asura-chat.collapsed .chat-body {
  display: none;
}

.asura-chat .chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 320px;
}

.asura-chat .message {
  display: flex;
  gap: 8px;
  animation: fadeIn 0.3s ease;
}

.asura-chat .message-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.asura-chat .message.user .message-avatar {
  background: #333;
}

.asura-chat .message-content {
  background: rgba(255, 255, 255, 0.08);
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 0.8rem;
  line-height: 1.4;
  flex: 1;
}

.asura-chat .message-time {
  font-size: 0.6rem;
  opacity: 0.5;
  margin-top: 4px;
}

.mic-btn {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.2rem;
  transition: all 0.3s ease;
}

.mic-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: scale(1.05);
}

.mic-btn.listening {
  background: #ff4db8;
  color: white;
  animation: pulseMic 1.2s infinite;
}

@keyframes pulseMic {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 77, 184, 0.5); }
  50% { box-shadow: 0 0 0 10px rgba(255, 77, 184, 0); }
}

.asura-chat .chat-input-area {
  padding: 12px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.asura-chat .asura-selector {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  padding: 8px 12px;
  color: #fff;
  font-size: 0.75rem;
  cursor: pointer;
  flex: 1;
  min-width: 100px;
}

.asura-chat .asura-selector option {
  background: #1a1a2a;
  color: #fff;
}

.asura-chat .chat-input-area input {
  flex: 2;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  padding: 8px 12px;
  color: #fff;
  font-size: 0.8rem;
  outline: none;
}

.asura-chat .chat-input-area input:focus {
  border-color: #ff4db8;
}

.asura-chat .chat-input-area button {
  background: linear-gradient(135deg, #ff4db8, #ff88dd);
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}

.asura-chat .chat-input-area button:hover {
  transform: scale(1.02);
}

.jarvis-indicator {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(15px);
  border-radius: 40px;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10001;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  border: 1px solid #ff4db8;
}

.jarvis-indicator.active {
  opacity: 1;
}

.jarvis-dot {
  width: 10px;
  height: 10px;
  background: #ff4db8;
  border-radius: 50%;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

.jarvis-wave {
  display: flex;
  gap: 3px;
  align-items: center;
}

.jarvis-wave span {
  width: 3px;
  height: 12px;
  background: #ff4db8;
  border-radius: 2px;
  animation: wave 0.8s ease-in-out infinite;
}

.jarvis-wave span:nth-child(1) { animation-delay: 0s; }
.jarvis-wave span:nth-child(2) { animation-delay: 0.1s; }
.jarvis-wave span:nth-child(3) { animation-delay: 0.2s; }
.jarvis-wave span:nth-child(4) { animation-delay: 0.3s; }

@keyframes wave {
  0%, 100% { height: 8px; }
  50% { height: 18px; }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Carro animado */
.car-marker {
  transition: all 0.1s linear;
  z-index: 10000;
}

@keyframes carShake {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-2px); }
}

.car-marker-moving {
  animation: carShake 0.5s ease infinite;
}

/* Toast da navegação */
#nav-toast {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(8px);
  color: white;
  padding: 12px 20px;
  border-radius: 40px;
  font-size: 14px;
  z-index: 20001;
  text-align: center;
  white-space: nowrap;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: none;
}

/* Botão de alternar tema */

    gap: 10px;
    width: 100%;
    padding: 12px;

<script>
// Toggle route panel
window.toggleRoute = function() {
  const panel = document.getElementById('route-panel');
  if (panel) {
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
  }
};

// Função para fechar o card de rota
window.closeRouteCard = function() {
  const panel = document.getElementById('route-panel');
  if (panel) {
    panel.style.display = 'none';
  }
  console.log('🚪 Card de rota fechado');
};

// Função para sair do modo rota
window.exitRouteMode = function() {
  if (window.routeLayer) {
    window.routeLayer.clearLayers();
  }
  
  const routeInfo = document.getElementById('route-info');
  if (routeInfo) {
    routeInfo.innerHTML = '';
    routeInfo.style.display = 'none';
  }
  
  const originInput = document.getElementById('route-origin');
  const destInput = document.getElementById('route-destination');
  
  if (originInput) originInput.value = '';
  if (destInput) destInput.value = '';
  
  if (window.locationEngine && window.locationEngine.getPosition) {
    const pos = window.locationEngine.getPosition();
    if (pos && window.map) {
      window.map.setView([pos.lat, pos.lng], 15);
    }
  }
  
  if (window.clearAllRoutes) window.clearAllRoutes();
  if (window.pararNavegacao) window.pararNavegacao();
  
  console.log('🚫 Modo rota encerrado');
};

// Limpar todas as rotas
window.clearAllRoutes = function() {
  if (window.routeLayer) {
    window.routeLayer.clearLayers();
  }
  const routeInfo = document.getElementById('route-info');
  if (routeInfo) {
    routeInfo.style.display = 'none';
  }
};

// Detectar redimensionamento e orientação
function ajustarMapaRedimensionamento() {
    if (window.map) {
        setTimeout(() => {
            window.map.invalidateSize();
            console.log('🗺️ Mapa ajustado para nova orientação');
        }, 100);
    }
}

window.addEventListener('orientationchange', () => {
    setTimeout(ajustarMapaRedimensionamento, 50);
});

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
        ajustarMapaRedimensionamento();
        
        const menu = document.getElementById('side-menu');
        if (menu && menu.classList.contains('open')) {
            menu.style.right = '0';
        }
    }, 200);
});

window.addEventListener('focus', ajustarMapaRedimensionamento);

// Garantir resize do mapa no load
window.addEventListener('load', () => {
  setTimeout(() => {
    if (window.map) {
      window.map.invalidateSize();
      console.log('🗺️ Mapa redimensionado');
    }
    ajustarZoomControles();
  }, 100);
});

function ajustarZoomControles() {
    const mapControls = document.querySelector('.map-controls');
    if (mapControls && window.innerWidth <= 768) {
        console.log('📱 Modo mobile ativo');
    }
}
