<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no
  "
/>

<title>Mapa Inteligente • Asuras Copilotos</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

/* ====================================== */
/* BASE */
/* ====================================== */

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

* {
  box-sizing: border-box;
}

#map {
  width: 100%;
  height: 100%;
}

/* ====================================== */
/* PAINÉIS */
/* ====================================== */

#search-panel,
#action-panel,
#route-panel {
  position: absolute;
  background: white;
  border-radius: 14px;
  box-shadow: 0 4px 18px rgba(0,0,0,.22);
  z-index: 9999;
}

/* ====================================== */
/* SEARCH PANEL */
/* ====================================== */

#search-panel {
  top: 10px;
  left: 10px;
  width: min(320px, calc(100vw - 20px));
  padding: 10px;
  display: none;
}

#search-input,
#route-origin,
#route-destination {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #ccc;
  border-radius: 8px;
  outline: none;
  font-size: 15px;
}

#search-input:focus,
#route-origin:focus,
#route-destination:focus {
  border-color: #555;
}

/* ====================================== */
/* SEARCH RESULTS */
/* ====================================== */

#search-results {
  max-height: 280px;
  overflow-y: auto;
  border-radius: 8px;
}

/* ====================================== */
/* ACTION PANEL */
/* ====================================== */

#action-panel {
  bottom: 20px;
  left: 10px;
  width: min(320px, calc(100vw - 20px));
  padding: 12px;
  display: none;
}

/* ====================================== */
/* ROUTE PANEL */
/* ====================================== */

#route-panel {
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  width: min(360px, calc(100vw - 20px));
  padding: 12px;
  display: none;
  flex-direction: column;
  gap: 8px;
}

/* ====================================== */
/* MODOS */
/* ====================================== */

.mode-container {
  display: flex;
  gap: 8px;
}

.mode-btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #f2f2f2;
  cursor: pointer;
  font-size: 18px;
  transition: .2s;
}

.mode-btn:hover {
  background: #e6e6e6;
}

.mode-btn.active {
  outline: 2px solid black;
  background: #ddd;
}

/* ====================================== */
/* BOTÃO ROTA */
/* ====================================== */

#createRouteBtn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: .2s;
}

#createRouteBtn:hover {
  opacity: .9;
}

/* ====================================== */
/* CONTROLES MAPA */
/* ====================================== */

.map-controls {
  position: absolute;
  right: 12px;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}

.control-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: none;
  background: white;
  box-shadow: 0 2px 10px rgba(0,0,0,.28);
  font-size: 18px;
  cursor: pointer;
  transition: .2s;
}

.control-btn:hover {
  transform: scale(1.05);
}

/* ====================================== */
/* ROUTE INFO */
/* ====================================== */

#route-info {
  position: absolute;
  bottom: 160px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  padding: 10px 14px;
  border-radius: 12px;
  z-index: 9998;
  font-weight: bold;
  box-shadow: 0 2px 10px rgba(0,0,0,.2);
  display: none;
  text-align: center;
  min-width: 140px;
}

@media (max-width: 600px) {
  #route-info {
    bottom: 240px;
  }
}

/* ====================================== */
/* SUGESTÕES */
/* ====================================== */

.suggestions {
  max-height: 120px;
  overflow-y: auto;
  border-radius: 8px;
}

.suggestions div {
  padding: 8px;
  cursor: pointer;
  border-radius: 6px;
  transition: .15s;
}

.suggestions div:hover {
  background: #eee;
}

/* ====================================== */
/* SCROLL */
/* ====================================== */

::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,.25);
  border-radius: 20px;
}

/* ====================================== */
/* MOBILE */
/* ====================================== */

@media (max-width: 600px) {
  #route-panel {
    top: auto;
    bottom: 80px;
  }
  .control-btn {
    width: 50px;
    height: 50px;
  }
}

/* ====================================== */
/* CHAT DO ASURA - ESTILOS */
/* ====================================== */

.asura-chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 360px;
  max-width: calc(100vw - 40px);
  background: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  z-index: 10000;
  transition: all 0.3s ease;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  font-family: 'Poppins', Arial, sans-serif;
}

.asura-chat.collapsed {
  transform: translateY(calc(100% - 60px));
}

.asura-chat .chat-header {
  padding: 12px 16px;
  background: rgba(0, 0, 0, 0.7);
  border-radius: 20px 20px 0 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.asura-chat .chat-header-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.asura-chat .chat-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  background: linear-gradient(135deg, #ff4db8, #ff88dd);
}

.asura-chat .chat-header h4 {
  color: #fff;
  font-size: 0.9rem;
  margin: 0;
}

.asura-chat .chat-status {
  font-size: 0.65rem;
  opacity: 0.7;
  color: #fff;
}

.asura-chat .chat-controls {
  display: flex;
  gap: 8px;
}

.asura-chat .chat-controls button {
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  font-size: 1.1rem;
  opacity: 0.7;
  transition: opacity 0.2s;
  padding: 0 4px;
}

.asura-chat .chat-controls button:hover {
  opacity: 1;
}

.asura-chat .chat-body {
  display: flex;
  flex-direction: column;
  height: 400px;
}

.asura-chat.collapsed .chat-body {
  display: none;
}

.asura-chat .chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 320px;
}

.asura-chat .message {
  display: flex;
  gap: 8px;
  animation: fadeIn 0.3s ease;
}

.asura-chat .message-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.asura-chat .message.asura .message-avatar {
  background: linear-gradient(135deg, #ff4db8, #ff88dd);
}

.asura-chat .message.user .message-avatar {
  background: #333;
}

.asura-chat .message-content {
  background: rgba(255, 255, 255, 0.08);
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 0.8rem;
  line-height: 1.4;
  flex: 1;
}

.asura-chat .message.asura .message-content {
  border-left: 2px solid #ff4db8;
}

.asura-chat .message-time {
  font-size: 0.6rem;
  opacity: 0.5;
  margin-top: 4px;
}

.asura-chat .chat-input-area {
  padding: 12px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.asura-chat .asura-selector {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  padding: 8px 12px;
  color: #fff;
  font-size: 0.75rem;
  cursor: pointer;
  flex: 1;
  min-width: 100px;
}

.asura-chat .asura-selector option {
  background: #1a1a2a;
  color: #fff;
}

.asura-chat .chat-input-area input {
  flex: 2;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  padding: 8px 12px;
  color: #fff;
  font-size: 0.8rem;
  outline: none;
}

.asura-chat .chat-input-area input:focus {
  border-color: #ff4db8;
}

.asura-chat .chat-input-area button {
  background: linear-gradient(135deg, #ff4db8, #ff88dd);
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}

.asura-chat .chat-input-area button:hover {
  transform: scale(1.02);
}

/* Botão para abrir o chat */
.open-chat-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff4db8, #ff88dd);
  border: none;
  font-size: 1.8rem;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  z-index: 9999;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.open-chat-btn:hover {
  transform: scale(1.05);
}

.open-chat-btn.hidden {
  display: none;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsivo */
@media (max-width: 600px) {
  .asura-chat {
    width: calc(100% - 40px);
    right: 20px;
    bottom: 20px;
  }
  .asura-chat .chat-body {
    height: 350px;
  }
  .open-chat-btn {
    width: 48px;
    height: 48px;
    font-size: 1.5rem;
    bottom: 20px;
    right: 20px;
  }
}

</style>
</head>

<body>

<!-- ====================================== -->
<!-- SEARCH PANEL -->
<!-- ====================================== -->

<div id="search-panel">
  <input id="search-input" autocomplete="off" placeholder="Buscar cidade, rua, mercado..." />
  <div id="search-results"></div>
</div>

<!-- ====================================== -->
<!-- ROUTE PANEL -->
<!-- ====================================== -->

<div id="route-panel">
  <input id="route-origin" autocomplete="off" placeholder="Origem (vazio = GPS)" />
  <div id="origin-suggestions" class="suggestions"></div>
  <input id="route-destination" autocomplete="off" placeholder="Destino" />
  <div id="dest-suggestions" class="suggestions"></div>
  <div class="mode-container">
    <button class="mode-btn active" data-mode="foot">🚶</button>
    <button class="mode-btn" data-mode="bike">🚴</button>
    <button class="mode-btn" data-mode="car">🚗</button>
  </div>
  <button id="createRouteBtn">Criar rota</button>
</div>

<!-- ====================================== -->
<!-- ACTION PANEL -->
<!-- ====================================== -->

<div id="action-panel"></div>

<!-- ====================================== -->
<!-- ROUTE INFO -->
<!-- ====================================== -->

<div id="route-info"></div>

<!-- ====================================== -->
<!-- MAP -->
<!-- ====================================== -->

<div id="map"></div>

<!-- ====================================== -->
<!-- MAP CONTROLES -->
<!-- ====================================== -->

<div class="map-controls">
  <button class="control-btn" onclick="toggleSearch()" title="Buscar">🔎</button>
  <button class="control-btn" onclick="centerOnUser()" title="Minha localização">📍</button>
  <button class="control-btn" onclick="toggleRoute()" title="Rotas">➜</button>
  <button class="control-btn" onclick="reloadNearbyPOIs()" title="Recarregar POIs">🔄</button>
</div>

<!-- ====================================== -->
<!-- CHAT DO ASURA (COPILOTO) -->
<!-- ====================================== -->

<div id="asura-chat" class="asura-chat collapsed">
  <div class="chat-header" id="chatHeader">
    <div class="chat-header-info">
      <div class="chat-avatar" id="chatAvatar">🤖</div>
      <div>
        <h4 id="chatAsuraName">DIVA</h4>
        <div class="chat-status" id="chatStatus">🟢 online</div>
      </div>
    </div>
    <div class="chat-controls">
      <button class="chat-minimize" id="chatMinimizeBtn">−</button>
      <button class="chat-close" id="chatCloseBtn">✕</button>
    </div>
  </div>
  
  <div class="chat-body" id="chatBody">
    <div class="chat-messages" id="chatMessages">
      <div class="message asura">
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          ✨ Olá! Sou sua assistente. Posso te ajudar a encontrar lugares no mapa!
          <div class="message-time">Agora</div>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <select id="asuraSelector" class="asura-selector">
        <option value="diva">🤖 DIVA - Automação</option>
        <option value="siria">🌳 SIRIA - Finanças</option>
        <option value="merlim">🔧 MERLIM - Tecnologia</option>
        <option value="astreia">👁️ ASTREIA - Segurança</option>
        <option value="umbra">🕵️ UMBRA - Investigação</option>
        <option value="atena">🦉 ATENA - Conhecimento</option>
        <option value="victoria">🏅 VICTORIA - Emergência</option>
        <option value="hestia">🔮 HESTIA - Justiça</option>
        <option value="daedala">⚗️ DAEDALA - Inovação</option>
      </select>
      <input type="text" id="chatInput" placeholder="Digite seu comando...">
      <button id="sendChatBtn">➤</button>
    </div>
  </div>
</div>

<!-- Botão flutuante para abrir o chat -->
<button id="openChatBtn" class="open-chat-btn" title="Abrir Assistente">
  💬
</button>

<!-- ====================================== -->
<!-- LEAFLET -->
<!-- ====================================== -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ====================================== -->
<!-- APP -->
<!-- ====================================== -->

<!-- ORDEM IMPORTA MUITO -->

<script src="js/icons.js"></script>

<!-- GPS CENTRAL -->
<script src="js/locationEngine.js"></script>

<!-- GEOCODING -->
<script src="js/geocoding.js"></script>

<!-- POIs -->
<script src="js/pois.js"></script>

<!-- DADOS -->
<script src="data/manual_pois.js"></script>

<!-- ROTA -->
<script src="js/routing.js"></script>

<!-- SEARCH -->
<script src="js/search.js"></script>

<!-- MAPA -->
<script src="js/mapa.js"></script>

<!-- CHAT DO ASURA -->
<script src="js/chat.js"></script>

</body>
</html>
