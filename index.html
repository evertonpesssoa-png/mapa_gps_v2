<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Mapa com GPS e POIs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; }
#map { height: 100%; width: 100%; }

/* =========================
   SEARCH PANEL
========================= */
#search-panel {
  display: none;
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 99999;
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  width: 250px;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
}

#search-panel input {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 6px;
  outline: none;
  margin-bottom: 6px;
}

#search-results {
  max-height: 180px;
  overflow-y: auto;
}

/* =========================
   ACTION PANEL
========================= */
#action-panel {
  display: none;
  position: absolute;
  bottom: 20px;
  left: 10px;
  z-index: 9999;
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  width: 250px;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
}

/* =========================
   ROUTE PANEL
========================= */
#route-panel {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1100;
  background: white;
  padding: 12px;
  border-radius: 14px;
  box-shadow: 0 4px 14px rgba(0,0,0,.3);
  width: 90%;
  max-width: 360px;
  display: none;
  flex-direction: column;
  gap: 8px;
}

/* =========================
   CONTROLES
========================= */
.map-controls {
  position: absolute;
  right: 12px;
  bottom: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.control-btn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: none;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  font-size: 18px;
  cursor: pointer;
}

#route-info {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: white;
  padding: 10px 14px;
  border-radius: 14px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,.25);
}
</style>
</head>

<body>

<!-- 🔎 SEARCH PANEL -->
<div id="search-panel">
  <input id="search-input" placeholder="Buscar local..." />
  <div id="search-results"></div>
</div>

<!-- ⚡ ACTION PANEL -->
<div id="action-panel"></div>

<!-- MAPA -->
<div id="map"></div>

<!-- CONTROLES -->
<div class="map-controls">

  <button class="control-btn" onclick="toggleSearch()">🔎</button>
  <button class="control-btn" onclick="centerOnUser()">📍</button>
  <button id="routeToggleBtn" class="control-btn">➜</button>

</div>

<div id="route-info"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="js/icons.js"></script>
<script src="js/geocoding.js"></script>
<script src="js/pois.js"></script>
<script src="data/manual_pois.js"></script>
<script src="js/routing.js"></script>

<!-- 🔥 SEARCH TEM QUE VIR ANTES DO MAPA -->
<script src="js/search.js"></script>
<script src="js/mapa.js"></script>

<!-- =========================
     AUTOCOMPLETE (FIXADO)
========================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  function setupAutocomplete(inputId, boxId) {
    const input = document.getElementById(inputId);
    const box = document.getElementById(boxId);

    if (!input || !box) return;

    input.addEventListener("input", () => {
      const text = input.value.toLowerCase();
      box.innerHTML = "";

      if (!text || !window.poiIndex) return;

      const results = window.poiIndex
        .filter(p => p.name.toLowerCase().includes(text))
        .slice(0, 5);

      results.forEach(p => {
        const div = document.createElement("div");
        div.className = "suggestion-item";
        div.textContent = p.name;

        div.onclick = () => {
          input.value = p.name;
          box.innerHTML = "";
        };

        box.appendChild(div);
      });
    });

    document.addEventListener("click", (e) => {
      if (!box.contains(e.target) && e.target !== input) {
        box.innerHTML = "";
      }
    });
  }

  setupAutocomplete("route-origin", "origin-suggestions");
  setupAutocomplete("route-destination", "dest-suggestions");

});
</script>

</body>
</html>
